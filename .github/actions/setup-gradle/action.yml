name: 'setup-gradle'
runs:
  using: "composite"
  steps:
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: "zulu"
        java-version: "20" # When changing the Java version make sure to also update jvmToolchain
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6 # By default, cache is only saved on the default branch
      with:
        workflow-job-context: ${{ github.job }}
    - name: Set up NDK
      shell: bash
      run: |
        # Use the sdkmanager in the PATH which is more reliable on CI
        echo "y" | sdkmanager --install "ndk;26.1.10909125"
        # Export the path so Gradle can find it even if it's not in the default location
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
    - name: Set up Konan
      uses: actions/cache@v5
      with:
        path: '~/.konan/**' # Will only exist for Kotlin Native gradle builds like iOS
        key: ${{ github.job }}-konan
    - name: Set up secrets
      shell: bash
      run: |
        set -Eeuo pipefail 
        bash tools/secrets/secrets.sh
