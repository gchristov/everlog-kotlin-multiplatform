name: 'setup-gradle'
runs:
  using: "composite"
  steps:
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: "zulu"
        java-version: "21" # When changing the Java version make sure to also update jvmToolchain
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6 # By default, cache is only saved on the 'master' branch
    - name: Set up Konan
      uses: actions/cache@v5
      with:
        path: '~/.konan/**' # Will only exist for Kotlin Native gradle builds like iOS
        key: ${{ github.job }}-konan
    - name: Set up secrets
      shell: bash
      run: |
        set -Eeuo pipefail 
        bash tools/scripts/secrets.sh