name: 'setup-gradle'
runs:
  using: "composite"
  steps:
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: "zulu"
        java-version: "20" # When changing the Java version make sure to also update jvmToolchain
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6 # By default, cache is only saved on the default branch
      with:
        workflow-job-context: ${{ github.job }}
    - name: Set up Konan
      uses: actions/cache@v5
      with:
        path: '~/.konan/**' # Will only exist for Kotlin Native gradle builds like iOS
        key: ${{ github.job }}-konan
    - name: Set up NDK
      shell: bash
      run: |
        # Find the sdkmanager tool (it's not in the PATH by default on CI)
        SDK_MANAGER=$(find $ANDROID_HOME/cmdline-tools -name sdkmanager | head -n 1)
        echo "y" | $SDK_MANAGER --install "ndk;26.1.10909125" # Must match ndkVersion in mobile/build.gradle.kts
        # Export the path so Gradle can find it
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV # Must match ndkVersion in mobile/build.gradle.kts
    - name: Set up secrets
      shell: bash
      run: |
        set -Eeuo pipefail 
        bash tools/secrets/secrets.sh
